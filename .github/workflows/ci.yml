name: CityBike CI

# Run CI on both direct pushes and pull requests.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  # Avoid wasting runner time: keep only the latest run per ref.
  group: citybike-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1: fast static checks before any container build.
  validate-contracts:
    name: Validate Contracts And Service Entrypoints
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install root dependencies
        run: npm ci

      # Validate OpenAPI syntax/structure for all documented services.
      - name: Validate all OpenAPI specifications
        run: |
          set -euo pipefail
          for f in \
            openapi/user-service.yaml \
            openapi/ride-service.yaml \
            openapi/bike-inventory-service.yaml \
            openapi/payment-service.yaml \
            openapi/partner-analytics-service.yaml \
            openapi/api-gateway-service.yaml \
            openapi/database-cluster-service.yaml
          do
            echo "=== validating $f ==="
            npx swagger-cli validate "$f"
          done

      # Catch JavaScript syntax errors early (without running services).
      - name: Check JavaScript syntax for all services
        run: |
          set -euo pipefail
          for f in \
            services/api-gateway-service/src/index.js \
            services/user-service/src/index.js \
            services/ride-service/src/index.js \
            services/bike-inventory-service/src/index.js \
            services/payment-service/src/index.js \
            services/partner-analytics-service/src/index.js \
            services/database-cluster-service/src/index.js
          do
            echo "=== checking $f ==="
            node --check "$f"
          done

  # Stage 2: deploy to a temporary staging environment and run contract tests.
  staging-contract-tests:
    name: Build Deploy To Staging And Run Contract Tests
    runs-on: ubuntu-latest
    needs: validate-contracts
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      # Create an isolated Python environment used by Schemathesis CLI.
      - name: Install Schemathesis
        run: |
          set -euo pipefail
          rm -rf .venv-schemathesis .hypothesis
          python3 -m venv .venv-schemathesis
          .venv-schemathesis/bin/pip install --upgrade pip
          .venv-schemathesis/bin/pip install schemathesis

      # Build images from current commit and start all services.
      - name: Build and deploy services to staging (Docker Compose)
        run: |
          set -euo pipefail
          docker compose up -d --build

      # Readiness gate: fail fast if any service cannot answer /status.
      - name: Smoke check all service status endpoints
        run: |
          set -euo pipefail
          wait_for_status() {
            local service_name="$1"
            local port="$2"
            local scheme="${3:-http}"
            local max_attempts="${4:-90}"
            local sleep_seconds="${5:-2}"
            local status_url="${scheme}://localhost:${port}/status"

            for attempt in $(seq 1 "$max_attempts"); do
              if [[ "$scheme" == "https" ]]; then
                if curl -k -fsS "$status_url" >/dev/null 2>&1; then
                  echo "ready: ${service_name} on ${port} (attempt ${attempt})"
                  return 0
                fi
              elif curl -fsS "$status_url" >/dev/null 2>&1; then
                echo "ready: ${service_name} on ${port} (attempt ${attempt})"
                return 0
              fi
              sleep "$sleep_seconds"
            done

            echo "readiness failed: ${service_name} on ${port}"
            docker compose ps || true
            docker compose logs --no-color "${service_name}" || true
            return 1
          }

          wait_for_status api-gateway-service 3000 https
          wait_for_status user-service 3001
          wait_for_status ride-service 3002
          wait_for_status bike-inventory-service 3003
          wait_for_status payment-service 3004
          wait_for_status partner-analytics-service 3005
          wait_for_status database-cluster-service 3006

      # Basic end-to-end smoke assertions for key API paths and auth headers.
      - name: Run smoke test script
        run: |
          set -euo pipefail
          bash openapi/tests/smoke/run_smoke.sh

      # Negative auth tests: protected endpoints must reject missing/invalid auth.
      - name: Run negative authentication checks
        run: |
          set -euo pipefail
          bash openapi/tests/schemathesis/run_auth_negative.sh

      # Negative payload tests: malformed/out-of-contract inputs should be rejected.
      - name: Run negative payload checks
        run: |
          set -euo pipefail
          bash openapi/tests/schemathesis/run_negative_data.sh

      # Full contract test suite across all services.
      - name: Run full Schemathesis task suite
        run: |
          set -euo pipefail
          bash openapi/tests/schemathesis/run_task_d.sh

      # Always collect runtime logs to support failure diagnosis.
      - name: Save docker compose logs
        if: always()
        run: |
          set -euo pipefail
          docker compose ps
          docker compose logs --no-color > ci-docker-compose.log

      # Upload Schemathesis per-service logs as CI artifacts.
      - name: Upload Schemathesis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-logs-${{ github.run_id }}
          path: openapi/tests/schemathesis/logs/
          if-no-files-found: warn
          retention-days: 14

      # Upload smoke logs to keep a compact evidence trail for quick failures.
      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ github.run_id }}
          path: openapi/tests/smoke/logs/
          if-no-files-found: warn
          retention-days: 14

      # Upload compose logs for debugging startup/runtime issues.
      - name: Upload docker compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs-${{ github.run_id }}
          path: ci-docker-compose.log
          if-no-files-found: warn
          retention-days: 14

      # Always clean up containers/volumes to keep runners deterministic.
      - name: Teardown staging environment
        if: always()
        run: |
          set -euo pipefail
          docker compose down -v --remove-orphans
