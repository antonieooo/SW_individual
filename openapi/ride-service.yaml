openapi: 3.0.3
info:
  title: Ride Service API
  version: 1.0.0
servers:
  - url: http://localhost:3002

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /internal/rides/start:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/StartRideRequestInternal'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /internal/rides/{rideId}/end:
    parameters:
      - $ref: '#/components/parameters/RideIdPath'
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/EndRideRequestInternal'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /internal/rides/{rideId}:
    parameters:
      - $ref: '#/components/parameters/RideIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /internal/users/{userId}/rides:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 20
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

components:
  parameters:
    UserIdPath:
      $ref: './components/common.yaml#/components/parameters/UserIdPath'
    RideIdPath:
      $ref: './components/common.yaml#/components/parameters/RideIdPath'
    IdempotencyKeyHeader:
      $ref: './components/common.yaml#/components/parameters/IdempotencyKeyHeaderInternal'

  securitySchemes:
    serviceJwt:
      $ref: './components/common.yaml#/components/securitySchemes/serviceJwt'
    internalMtls:
      $ref: './components/common.yaml#/components/securitySchemes/internalMtls'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    Forbidden:
      $ref: './components/common.yaml#/components/responses/Forbidden'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
    Conflict:
      $ref: './components/common.yaml#/components/responses/Conflict'
    UpstreamError:
      $ref: './components/common.yaml#/components/responses/UpstreamError'
