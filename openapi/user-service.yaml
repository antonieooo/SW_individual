openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
servers:
  - url: http://localhost:3001

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /internal/auth/login:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/LoginRequestInternal'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/LoginResponseInternal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /internal/users/{userId}/profile:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      security:
        - internalMtls: []
          serviceJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/UserProfilePatch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/users/{userId}/payment-binding:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/PaymentBindingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/users/{userId}/dashboard:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/UserDashboardInternal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    UserIdPath:
      $ref: './components/common.yaml#/components/parameters/UserIdPath'

  securitySchemes:
    serviceJwt:
      $ref: './components/common.yaml#/components/securitySchemes/serviceJwt'
    internalMtls:
      $ref: './components/common.yaml#/components/securitySchemes/internalMtls'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    Forbidden:
      $ref: './components/common.yaml#/components/responses/Forbidden'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
