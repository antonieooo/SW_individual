openapi: 3.0.3
info:
  title: Database Cluster Service API
  version: 1.0.0
servers:
  - url: http://localhost:3006

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /internal/db/{schema}/{collection}/get:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
          dbCredential: []
      parameters:
        - $ref: '#/components/parameters/SchemaPath'
        - $ref: '#/components/parameters/CollectionPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/DbGetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DbItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/db/{schema}/{collection}/list:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
          dbCredential: []
      parameters:
        - $ref: '#/components/parameters/SchemaPath'
        - $ref: '#/components/parameters/CollectionPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/DbListRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DbListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/db/{schema}/{collection}/upsert:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
          dbCredential: []
      parameters:
        - $ref: '#/components/parameters/SchemaPath'
        - $ref: '#/components/parameters/CollectionPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/DbUpsertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DbItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/db/analytics/refresh:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
          dbCredential: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/AnalyticsRefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DailyUsageReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /internal/db/analytics/daily-usage:
    get:
      security:
        - internalMtls: []
          serviceJwt: []
          dbCredential: []
      parameters:
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DailyUsageReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    SchemaPath:
      $ref: './components/common.yaml#/components/parameters/SchemaPath'
    CollectionPath:
      $ref: './components/common.yaml#/components/parameters/CollectionPath'

  securitySchemes:
    serviceJwt:
      $ref: './components/common.yaml#/components/securitySchemes/serviceJwt'
    internalMtls:
      $ref: './components/common.yaml#/components/securitySchemes/internalMtls'
    dbCredential:
      $ref: './components/common.yaml#/components/securitySchemes/dbCredential'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    Forbidden:
      $ref: './components/common.yaml#/components/responses/Forbidden'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
