openapi: 3.0.3
info:
  title: Partner Analytics Service API
  version: 1.0.0
servers:
  - url: http://localhost:3005

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /internal/reports/daily-usage:
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      parameters:
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DailyUsageReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'

components:
  securitySchemes:
    serviceJwt:
      $ref: './components/common.yaml#/components/securitySchemes/serviceJwt'
    internalMtls:
      $ref: './components/common.yaml#/components/securitySchemes/internalMtls'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
    UpstreamError:
      $ref: './components/common.yaml#/components/responses/UpstreamError'
