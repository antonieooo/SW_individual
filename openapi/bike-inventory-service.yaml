openapi: 3.0.3
info:
  title: Bike Inventory Service API
  version: 1.0.0
servers:
  - url: http://localhost:3003

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /internal/bikes/{bikeId}:
    parameters:
      - $ref: '#/components/parameters/BikeIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/BikeState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/bikes/{bikeId}/reserve:
    parameters:
      - $ref: '#/components/parameters/BikeIdPath'
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/BikeState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /internal/bikes/{bikeId}/release:
    parameters:
      - $ref: '#/components/parameters/BikeIdPath'
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/ReleaseBikeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/BikeState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/device-events:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
          deviceCert: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/DeviceEventRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DeviceEventAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /internal/admin/bikes/{bikeId}/override-lock:
    parameters:
      - $ref: '#/components/parameters/BikeIdPath'
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/OverrideLockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/BikeState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    BikeIdPath:
      $ref: './components/common.yaml#/components/parameters/BikeIdPath'

  securitySchemes:
    serviceJwt:
      $ref: './components/common.yaml#/components/securitySchemes/serviceJwt'
    internalMtls:
      $ref: './components/common.yaml#/components/securitySchemes/internalMtls'
    deviceCert:
      $ref: './components/common.yaml#/components/securitySchemes/deviceCert'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    Forbidden:
      $ref: './components/common.yaml#/components/responses/Forbidden'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
    Conflict:
      $ref: './components/common.yaml#/components/responses/Conflict'
