openapi: 3.0.3
info:
  title: Payment Service API
  version: 1.0.0
servers:
  - url: http://localhost:3004

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /internal/payments/charge:
    post:
      security:
        - internalMtls: []
          serviceJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/ChargeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/PaymentResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /internal/payments/{paymentId}:
    parameters:
      - $ref: '#/components/parameters/PaymentIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /internal/users/{userId}/billing-summary:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      security:
        - internalMtls: []
          serviceJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/PaymentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

components:
  parameters:
    UserIdPath:
      $ref: './components/common.yaml#/components/parameters/UserIdPath'
    PaymentIdPath:
      $ref: './components/common.yaml#/components/parameters/PaymentIdPath'
    IdempotencyKeyHeader:
      $ref: './components/common.yaml#/components/parameters/IdempotencyKeyHeaderInternal'

  securitySchemes:
    serviceJwt:
      $ref: './components/common.yaml#/components/securitySchemes/serviceJwt'
    internalMtls:
      $ref: './components/common.yaml#/components/securitySchemes/internalMtls'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    Forbidden:
      $ref: './components/common.yaml#/components/responses/Forbidden'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
    Conflict:
      $ref: './components/common.yaml#/components/responses/Conflict'
    UpstreamError:
      $ref: './components/common.yaml#/components/responses/UpstreamError'
