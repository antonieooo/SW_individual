openapi: 3.0.3
info:
  title: API Gateway Service API
  version: 1.0.0
servers:
  - url: https://localhost:3000

paths:
  /status:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/ServiceStatus'

  /api/v1/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/LoginRequestGateway'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/LoginResponseGateway'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/users/{userId}/profile:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      security:
        - userJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'
    patch:
      security:
        - userJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/UserProfilePatch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/users/{userId}/dashboard:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      security:
        - userJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/UserDashboardGateway'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/users/{userId}/rides:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 20
    get:
      security:
        - userJwt: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/rides/start:
    post:
      security:
        - userJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/StartRideRequestGateway'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/rides/{rideId}/end:
    parameters:
      - $ref: '#/components/parameters/RideIdPath'
    post:
      security:
        - userJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/EndRideRequestGateway'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/RideResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/admin/bikes/{bikeId}/override-lock:
    parameters:
      - $ref: '#/components/parameters/BikeIdPath'
    post:
      security:
        - userJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/OverrideLockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/BikeState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/device/events:
    post:
      security:
        - deviceCert: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/common.yaml#/components/schemas/DeviceEventRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DeviceEventAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /api/v1/partner/reports/daily-usage:
    get:
      security:
        - partnerApiKey: []
      parameters:
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/common.yaml#/components/schemas/DailyUsageReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/UpstreamError'

components:
  parameters:
    UserIdPath:
      $ref: './components/common.yaml#/components/parameters/UserIdPath'
    RideIdPath:
      $ref: './components/common.yaml#/components/parameters/RideIdPath'
    BikeIdPath:
      $ref: './components/common.yaml#/components/parameters/BikeIdPath'
    IdempotencyKeyHeader:
      $ref: './components/common.yaml#/components/parameters/IdempotencyKeyHeaderGateway'

  securitySchemes:
    userJwt:
      $ref: './components/common.yaml#/components/securitySchemes/userJwt'
    partnerApiKey:
      $ref: './components/common.yaml#/components/securitySchemes/partnerApiKey'
    deviceCert:
      $ref: './components/common.yaml#/components/securitySchemes/deviceCert'

  responses:
    BadRequest:
      $ref: './components/common.yaml#/components/responses/BadRequest'
    Unauthorized:
      $ref: './components/common.yaml#/components/responses/Unauthorized'
    Forbidden:
      $ref: './components/common.yaml#/components/responses/Forbidden'
    NotFound:
      $ref: './components/common.yaml#/components/responses/NotFound'
    Conflict:
      $ref: './components/common.yaml#/components/responses/Conflict'
    UpstreamError:
      $ref: './components/common.yaml#/components/responses/UpstreamError'
